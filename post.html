<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Artigo — Dra. Létícia Rocha</title>
<meta name="theme-color" content="#CC2F89">
<link rel="icon" href="assets/simbolo.svg" type="image/svg+xml">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito+Sans:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">

<style>
:root{
  --magenta:#CC2F89; --coral:#FF8A98; --coral-soft:#FFC2CA;
  --cream:#FCEFEC; --cream-deep:#F4DFDA; --line:#EFDCD8; --ink:#3B2130; --muted:#8A6C7C; --white:#fff;
  --grad:linear-gradient(135deg,var(--coral) 0%,var(--magenta) 100%);
  --shadow-s:0 2px 10px rgba(159,40,110,.05);
  --shadow-m:0 14px 38px rgba(159,40,110,.08);
  --shadow-l:0 32px 70px rgba(159,40,110,.14);
  --r-s:14px; --r-m:22px; --r-l:30px; --r-xl:44px;
  --display:'Baloo 2',system-ui,sans-serif;
  --body:'Nunito Sans',system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box}
body{margin:0;background:var(--cream);color:var(--ink);font-family:var(--body);font-size:17px;line-height:1.75;-webkit-font-smoothing:antialiased}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
h1,h2,h3{font-family:var(--display);line-height:1.15;margin:0;font-weight:700;letter-spacing:-.018em}
h1{font-size:clamp(1.9rem,4.4vw,2.7rem);font-weight:800;letter-spacing:-.025em}
p{margin:0 0 1.2rem}
:focus-visible{outline:3px solid var(--magenta);outline-offset:3px;border-radius:8px}

.wrap{width:100%;max-width:1180px;margin:0 auto;padding:0 22px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;font-family:var(--display);font-weight:700;font-size:1rem;padding:15px 28px;border-radius:100px;transition:.28s cubic-bezier(.2,.8,.2,1)}
.btn-white{background:#fff;color:var(--magenta);box-shadow:0 14px 30px rgba(0,0,0,.15)}
.btn-white:hover{transform:translateY(-3px)}
.btn-ghost{border:2px solid rgba(204,47,137,.25);color:var(--magenta)}
.btn-ghost:hover{background:rgba(204,47,137,.06)}
.btn svg{width:20px;height:20px;flex:none}

/* header */
.hdr{position:fixed;inset:0 0 auto;z-index:60;background:rgba(252,239,236,.82);backdrop-filter:blur(18px) saturate(1.2);box-shadow:0 2px 24px rgba(159,40,110,.06)}
.hdr-in{display:flex;align-items:center;justify-content:space-between;gap:20px;padding:14px 0}
.brand img{height:40px;width:auto}
.back-link{font-weight:700;font-family:var(--display);font-size:.92rem;color:var(--magenta);display:inline-flex;align-items:center;gap:8px}
.back-link:hover{text-decoration:underline}

/* conteúdo */
.post-wrap{max-width:760px;margin:0 auto;padding:150px 22px 40px}
.post-date{display:inline-block;font-family:var(--display);font-weight:700;font-size:.78rem;letter-spacing:.14em;text-transform:uppercase;color:var(--magenta);margin-bottom:16px}
.post-wrap h1{margin-bottom:26px}
.post-cover{border-radius:var(--r-l);box-shadow:var(--shadow-m);overflow:hidden;aspect-ratio:16/9;margin-bottom:34px}
.post-cover img{width:100%;height:100%;object-fit:cover}
.post-content{font-size:1.08rem;color:var(--ink)}
.post-content p:first-of-type::first-letter{
  font-family:var(--display);font-weight:800;font-size:3.4em;line-height:.78;float:left;
  margin:.03em .09em 0 0;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;
}

/* estados */
.state{text-align:center;padding:70px 20px}
.spinner{width:38px;height:38px;border-radius:50%;border:3px solid var(--cream-deep);border-top-color:var(--magenta);animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.state p{color:var(--muted)}
.notfound-card{background:#fff;border:1px dashed rgba(204,47,137,.3);border-radius:var(--r-l);padding:44px 30px;max-width:480px;margin:0 auto}
.notfound-card h3{font-size:1.2rem;margin-bottom:10px}
.notfound-card p{color:var(--muted);margin-bottom:18px}

/* autora */
.author-card{display:flex;align-items:center;gap:18px;background:#fff;border:1px solid var(--line);border-radius:var(--r-l);padding:22px 26px;margin:44px 0;box-shadow:var(--shadow-s)}
.author-card img{width:66px;height:66px;border-radius:50%;object-fit:cover;flex:none}
.author-card b{font-family:var(--display);display:block;font-size:1.05rem;margin-bottom:3px}
.author-card span{color:var(--muted);font-size:.9rem;line-height:1.4}

/* cta final */
.post-cta{background:var(--grad);color:#fff;border-radius:var(--r-l);padding:36px 32px;text-align:center;margin-top:20px}
.post-cta h3{font-size:1.4rem;margin-bottom:16px;color:#fff}

/* footer */
.ft{background:#2E1926;color:rgba(255,255,255,.62);padding:44px 0 24px;font-size:.91rem;text-align:center;margin-top:20px}
.ft img{height:56px;margin:0 auto 16px}
.ft-bottom{margin-top:22px;padding-top:18px;border-top:1px solid rgba(255,255,255,.1);display:flex;flex-wrap:wrap;gap:10px;justify-content:center;font-size:.85rem}
.ft-bottom a{color:var(--coral-soft)}

@media(max-width:640px){
  .post-wrap{padding:126px 18px 30px}
  .author-card{flex-direction:column;text-align:center;padding:26px 20px}
}
</style>
</head>
<body>

<header class="hdr">
  <div class="wrap hdr-in">
    <a href="index.html" class="brand" aria-label="Letícia Rocha — início">
      <img src="assets/logo.png" alt="Letícia Rocha Fisioterapeuta">
    </a>
    <a href="blog.html" class="back-link">← Todos os artigos</a>
  </div>
</header>

<div class="post-wrap" id="postWrap">
  <div class="state" id="loadingState"><div class="spinner"></div><p>Carregando artigo...</p></div>
</div>

<footer class="ft">
  <div class="wrap">
    <img src="assets/logo-branco.png" alt="Letícia Rocha Fisioterapeuta">
    <div class="ft-bottom">
      <span>© <span id="ano"></span> Letícia Rocha · Fisioterapeuta Osteopata</span>
      <a href="index.html">Voltar ao site</a>
    </div>
  </div>
</footer>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
function escapeHtml(t) {
  return String(t == null ? '' : t)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function formatarDataPost(iso) {
  try { return new Date(iso).toLocaleDateString('pt-BR', { day: 'numeric', month: 'long', year: 'numeric' }); }
  catch (e) { return ''; }
}

function renderConteudo(txt) {
  const escaped = escapeHtml(txt);
  return escaped.split(/\n{2,}/)
    .map(p => '<p>' + p.replace(/\n/g, '<br>') + '</p>')
    .join('');
}

function mostrarNaoEncontrado() {
  document.getElementById('postWrap').innerHTML = `
    <div class="state">
      <div class="notfound-card">
        <h3>Artigo não encontrado</h3>
        <p>Esse artigo pode ter sido removido ou o link está incorreto.</p>
        <a class="btn btn-ghost" href="blog.html">Ver todos os artigos</a>
      </div>
    </div>`;
}

async function montarLinkWhatsapp() {
  let numero = '5511917879980';
  let mensagem = 'Olá, Dra. Letícia! Li um artigo no seu site e gostaria de conversar.';
  try {
    if (window.supabase && window.SUPABASE_URL && !window.SUPABASE_URL.includes('SEU-PROJETO')) {
      const sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
      const { data, error } = await sb.from('site_config').select('dados').eq('id', 1).single();
      if (!error && data && data.dados) {
        if (data.dados.whatsapp) numero = data.dados.whatsapp;
        if (data.dados.mensagem) mensagem = data.dados.mensagem;
      }
    }
  } catch (e) { /* mantém o fallback */ }
  const link = document.getElementById('ctaWpp');
  if (link) link.href = 'https://wa.me/' + numero + '?text=' + encodeURIComponent(mensagem);
}

function renderPost(p) {
  document.title = p.titulo + ' — Dra. Létícia Rocha';
  const capa = p.capa
    ? `<div class="post-cover"><img src="${p.capa}" alt="${escapeHtml(p.titulo)}"></div>`
    : '';
  document.getElementById('postWrap').innerHTML = `
    <span class="post-date">${escapeHtml(formatarDataPost(p.criado_em))}</span>
    <h1>${escapeHtml(p.titulo)}</h1>
    ${capa}
    <div class="post-content">${renderConteudo(p.conteudo)}</div>

    <div class="author-card">
      <img src="assets/leticia-retrato.jpg" alt="Dra. Letícia Rocha">
      <div>
        <b>Dra. Letícia Rocha</b>
        <span>Fisioterapeuta Osteopata · 29 anos de experiência · Crefito2/25112F</span>
      </div>
    </div>

    <div class="post-cta">
      <h3>Ficou com alguma dúvida?</h3>
      <a class="btn btn-white" id="ctaWpp" href="#" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 0-8.6 15.1L2 22l5-1.3A10 10 0 1 0 12 2zm0 18.2c-1.5 0-3-.4-4.3-1.2l-.3-.2-3 .8.8-2.9-.2-.3A8.2 8.2 0 1 1 12 20.2z"/></svg>
        Falar no WhatsApp
      </a>
    </div>`;
  montarLinkWhatsapp();
}

async function carregarPost() {
  const id = new URLSearchParams(location.search).get('id');
  if (!id) { mostrarNaoEncontrado(); return; }
  try {
    if (!window.supabase || !window.SUPABASE_URL || window.SUPABASE_URL.includes('SEU-PROJETO')) {
      mostrarNaoEncontrado(); return;
    }
    const sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
    const { data, error } = await sb.from('posts')
      .select('id,titulo,conteudo,capa,criado_em')
      .eq('id', id)
      .eq('publicado', true)
      .single();
    if (error || !data) { mostrarNaoEncontrado(); return; }
    renderPost(data);
  } catch (e) {
    mostrarNaoEncontrado();
  }
}

carregarPost();
document.getElementById('ano').textContent = new Date().getFullYear();
</script>
</body>
</html>
